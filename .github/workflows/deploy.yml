name: Deploy to Beget

on:
  push:
    branches:
      - main # ветка, от которой деплой

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p .ssh
          echo "" >> ~/.ssh/known_hosts
          chmod 600 .ssh/id_ed25519
          echo "${{ secrets.test }}" > ~/.ssh/id_ed25519
         

      - name: Pull repository on server
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 svstenew_deployuser@svstenew.beget.tech \
          "git fetch origin && git reset --hard origin/main"
