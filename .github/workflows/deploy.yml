name: Deploy to Beget

on:
  push:
    branches:
      - main # ветка, от которой деплой

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4        # версия с поддержкой Node.js 24
        uses: actions/setup-node@v4       # более новая версия
          with:
            node-version: 24

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H svstenew.beget.tech >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/id_ed25519 svstenew_deployuser@svstenew.beget.tech "git pull"
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_SECRET }}
